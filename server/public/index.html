<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Electro — Tara Robot Dashboard</title>
  <style>
    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2a2d3a;
      --accent:  #6c63ff;
      --green:   #22c55e;
      --yellow:  #eab308;
      --red:     #ef4444;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --radius:  10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 1.2rem; font-weight: 600; }
    header .logo { font-size: 1.5rem; }
    .refresh-btn {
      margin-left: auto;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius);
      padding: 8px 16px; cursor: pointer; font-size: .85rem;
    }
    .refresh-btn:hover { opacity: .85; }

    /* ── Layout ─────────────────────────────────────────── */
    main {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 0;
      height: calc(100vh - 57px);
    }

    /* ── Device list ────────────────────────────────────── */
    #device-list {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px;
    }
    #device-list h2 { font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px; }
    .device-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color .15s;
    }
    .device-card:hover  { border-color: var(--accent); }
    .device-card.active { border-color: var(--accent); background: #1e1b4b22; }
    .device-card .name  { font-weight: 600; font-size: .95rem; }
    .device-card .id    { font-size: .72rem; color: var(--muted); margin-top: 2px; font-family: monospace; }
    .device-card .meta  { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
    .badge {
      font-size: .68rem; padding: 2px 8px; border-radius: 999px; font-weight: 600;
    }
    .badge.online  { background: #166534; color: #bbf7d0; }
    .badge.offline { background: #7f1d1d; color: #fecaca; }
    .fw { font-size: .72rem; color: var(--muted); }

    /* ── Detail panel ───────────────────────────────────── */
    #detail {
      overflow-y: auto;
      padding: 24px;
      display: flex; flex-direction: column; gap: 20px;
    }
    #detail.empty {
      align-items: center; justify-content: center;
    }
    .empty-msg { color: var(--muted); font-size: .9rem; }

    /* ── Cards ──────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .card h3 {
      font-size: .8rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em;
      margin-bottom: 16px;
    }

    /* Health grid */
    .health-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    }
    .stat { text-align: center; }
    .stat .val { font-size: 1.6rem; font-weight: 700; }
    .stat .lbl { font-size: .72rem; color: var(--muted); margin-top: 2px; }

    /* Config editor */
    textarea {
      width: 100%; height: 200px;
      background: #0f1117; color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 10px; font-family: 'Courier New', monospace; font-size: .83rem;
      resize: vertical;
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    .btn-row { display: flex; gap: 10px; margin-top: 12px; }
    .btn {
      padding: 8px 18px; border: none; border-radius: var(--radius);
      cursor: pointer; font-size: .85rem; font-weight: 600;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost   { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn:hover   { opacity: .85; }

    /* Control buttons */
    .face-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    }
    .face-btn {
      padding: 8px 4px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); cursor: pointer; font-size: .8rem; text-align: center;
    }
    .face-btn:hover { border-color: var(--accent); color: var(--accent); }

    .speech-row { display: flex; gap: 8px; }
    .speech-row input {
      flex: 1; background: #0f1117; color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 12px; font-size: .85rem;
    }
    .speech-row input:focus { outline: none; border-color: var(--accent); }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 18px;
      font-size: .85rem; opacity: 0; transition: opacity .2s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }

    /* Sensors table */
    table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    th, td { padding: 7px 10px; border-bottom: 1px solid var(--border); text-align: left; }
    th { color: var(--muted); font-weight: 500; }
  </style>
</head>
<body>

<header>
  <span class="logo">🤖</span>
  <h1>Electro — Tara Robot Dashboard</h1>
  <button class="refresh-btn" onclick="loadDevices()">Refresh</button>
</header>

<main>
  <aside id="device-list">
    <h2>Registered Devices</h2>
    <div id="device-items">Loading…</div>
  </aside>

  <section id="detail" class="empty">
    <p class="empty-msg">Select a device to view details</p>
  </section>
</main>

<div id="toast"></div>

<script>
const BASE = '';    // same origin
let selected = null;
let devices  = [];

// ── Helpers ────────────────────────────────────────────────────────────────
function toast(msg, ok = true) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderColor = ok ? 'var(--green)' : 'var(--red)';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

async function api(method, path, body) {
  const res = await fetch(BASE + path, {
    method,
    headers: body ? { 'Content-Type': 'application/json' } : {},
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) throw new Error(`${res.status}`);
  return res.json();
}

function isOnline(lastSeen) {
  return Date.now() - new Date(lastSeen).getTime() < 90_000; // 90 s
}

// ── Device list ────────────────────────────────────────────────────────────
async function loadDevices() {
  devices = await api('GET', '/robot');
  const el = document.getElementById('device-items');
  if (!devices.length) { el.innerHTML = '<p style="color:var(--muted);font-size:.85rem">No devices registered yet.</p>'; return; }

  el.innerHTML = devices.map(d => `
    <div class="device-card ${selected === d.deviceId ? 'active' : ''}"
         onclick="selectDevice('${d.deviceId}')">
      <div class="name">${d.deviceName}</div>
      <div class="id">${d.deviceId}</div>
      <div class="meta">
        <span class="badge ${isOnline(d.lastSeen) ? 'online' : 'offline'}">
          ${isOnline(d.lastSeen) ? 'ONLINE' : 'OFFLINE'}
        </span>
        <span class="fw">v${d.firmwareVersion}</span>
      </div>
    </div>
  `).join('');
}

// ── Detail view ────────────────────────────────────────────────────────────
async function selectDevice(id) {
  selected = id;
  loadDevices(); // re-render list for active state

  const detail = document.getElementById('detail');
  detail.className = '';
  detail.innerHTML = '<p style="color:var(--muted)">Loading…</p>';

  const d = await api('GET', `/robot/${id}`);
  const online = isOnline(d.lastSeen);
  const lastReading = d.readings[0];

  const latestConfig = d.configs[0]
    ? JSON.stringify(d.configs[0].config, null, 2)
    : JSON.stringify({ version: 1, displayBrightness: 80, volume: 70, idleTimeout: 300 }, null, 2);

  detail.innerHTML = `
    <!-- Health -->
    <div class="card">
      <h3>Health</h3>
      <div class="health-grid">
        <div class="stat">
          <div class="val" style="color:${online ? 'var(--green)' : 'var(--red)'}">
            ${online ? 'ONLINE' : 'OFFLINE'}
          </div>
          <div class="lbl">Status</div>
        </div>
        <div class="stat">
          <div class="val">${d.firmwareVersion}</div>
          <div class="lbl">Firmware</div>
        </div>
        <div class="stat">
          <div class="val">${timeSince(d.lastSeen)}</div>
          <div class="lbl">Last Seen</div>
        </div>
      </div>

      ${lastReading ? `
      <div style="margin-top:16px">
        <table>
          <thead><tr><th>Metric</th><th>Value</th><th>Recorded</th></tr></thead>
          <tbody>
            ${lastReading.temperature != null ? `<tr><td>Temperature</td><td>${lastReading.temperature} °C</td><td>${timeSince(lastReading.recordedAt)}</td></tr>` : ''}
            ${lastReading.humidity    != null ? `<tr><td>Humidity</td><td>${lastReading.humidity} %</td><td>${timeSince(lastReading.recordedAt)}</td></tr>` : ''}
            ${lastReading.light       != null ? `<tr><td>Light</td><td>${lastReading.light} %</td><td>${timeSince(lastReading.recordedAt)}</td></tr>` : ''}
          </tbody>
        </table>
      </div>
      ` : ''}
    </div>

    <!-- Controls -->
    <div class="card">
      <h3>Display</h3>
      <div class="face-grid" id="faces"></div>
    </div>

    <div class="card">
      <h3>Speech</h3>
      <div class="speech-row">
        <input id="speech-input" type="text" placeholder="Enter text for Tara to say…" />
        <button class="btn btn-primary" onclick="sendSpeech('${d.deviceId}')">Say It</button>
      </div>
    </div>

    <!-- Config editor -->
    <div class="card">
      <h3>Configuration</h3>
      <textarea id="config-editor">${latestConfig}</textarea>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="pushConfig('${d.deviceId}')">Push Config</button>
        <button class="btn btn-ghost"   onclick="formatConfig()">Format JSON</button>
      </div>
    </div>
  `;

  // Render face buttons
  const faces = ['idle','happy','sad','thinking','sleeping','listening','speaking','error'];
  document.getElementById('faces').innerHTML = faces.map(f => `
    <button class="face-btn" onclick="sendFace('${d.deviceId}','${f}')">${f}</button>
  `).join('');
}

// ── Commands ───────────────────────────────────────────────────────────────
async function sendFace(deviceId, face) {
  try {
    await api('POST', `/robot/${deviceId}/display`, { face });
    toast(`Face: ${face}`);
  } catch (e) { toast(`Error: ${e.message}`, false); }
}

async function sendSpeech(deviceId) {
  const text = document.getElementById('speech-input').value.trim();
  if (!text) return;
  try {
    await api('POST', `/robot/${deviceId}/speech`, { text });
    toast('Speech sent');
    document.getElementById('speech-input').value = '';
  } catch (e) { toast(`Error: ${e.message}`, false); }
}

async function pushConfig(deviceId) {
  const raw = document.getElementById('config-editor').value;
  let cfg;
  try   { cfg = JSON.parse(raw); }
  catch { toast('Invalid JSON', false); return; }
  try {
    const res = await api('PUT', `/robot/${deviceId}/config`, cfg);
    toast(`Config pushed — v${res.version}`);
  } catch (e) { toast(`Error: ${e.message}`, false); }
}

function formatConfig() {
  const el = document.getElementById('config-editor');
  try   { el.value = JSON.stringify(JSON.parse(el.value), null, 2); }
  catch { toast('Invalid JSON', false); }
}

// ── Utils ──────────────────────────────────────────────────────────────────
function timeSince(iso) {
  const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (s < 60)   return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  return `${Math.floor(s/3600)}h ago`;
}

// ── Init ───────────────────────────────────────────────────────────────────
loadDevices();
setInterval(loadDevices, 30_000); // auto-refresh list every 30 s
</script>
</body>
</html>
